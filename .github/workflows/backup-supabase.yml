name: Supabase data backup

# Maakt automatisch versies van de complete TPG Finance dataset in dit repo.
#
# - Cron: elke 6 uur (00:00, 06:00, 12:00, 18:00 UTC)
# - Manueel: via Actions tab → "Supabase data backup" → "Run workflow"
# - Bij elke run wordt scripts/backup-supabase.mjs gedraaid; output komt
#   onder backups/<datum>/<timestamp>.json. backups/LATEST.json wijst altijd
#   naar de laatste.
# - Alleen commit als er ook echt wat verandert (anders skip).
#
# Vereiste secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_URL          — https://<jouw-project>.supabase.co
#   SUPABASE_SERVICE_ROLE — service_role key (Project Settings → API)

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/backup-supabase.mjs'
      - '.github/workflows/backup-supabase.yml'

permissions:
  contents: write

concurrency:
  group: supabase-backup
  cancel-in-progress: false

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Supabase backup
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE: ${{ secrets.SUPABASE_SERVICE_ROLE }}
        run: node scripts/backup-supabase.mjs

      - name: Commit en push als er iets gewijzigd is
        run: |
          git config user.name  "tpg-finance-bot"
          git config user.email "bot@thepeoplegroup.nl"
          git add backups/
          if git diff --staged --quiet; then
            echo "Geen wijzigingen — niets te committen"
          else
            ts=$(date -u +'%Y-%m-%d %H:%M UTC')
            git commit -m "backup: Supabase snapshot ${ts}"
            git push
          fi
